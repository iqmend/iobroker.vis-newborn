<style>
  /* ============================================================== */
  /*  Toggle widget (vis-newborn-toggle-*)                          */
  /* ============================================================== */
  .vis-newborn-toggle,
  .vis-newborn-toggle *,
  .vis-newborn-toggle *::before,
  .vis-newborn-toggle *::after {
    box-sizing: border-box;
  }

  .vis-newborn-toggle {
    --tg-w: 132px;
    --tg-h: 56px;
    --tg-pad: 5px;
    --tg-radius: 999px;

    --tg-off-bg: #e2453c;
    --tg-off-bg-deep: #b6332b;
    --tg-on-bg: #9ec9e8;
    --tg-on-bg-deep: #6fa9d0;

    --tg-handle: #d8d8dc;
    --tg-handle-deep: #9a9aa1;

    --tg-label: #ffffff;
    --tg-label-on: #1d3a52;

    position: relative;
    display: inline-block;
    width: var(--tg-w);
    height: var(--tg-h);
    border-radius: var(--tg-radius);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;

    background: linear-gradient(180deg, var(--tg-off-bg) 0%, var(--tg-off-bg-deep) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.18),
      inset 0 -2px 6px rgba(0, 0, 0, 0.18),
      0 6px 18px -6px rgba(226, 69, 60, 0.55);
    transition:
      background 420ms cubic-bezier(.65, .05, .36, 1),
      box-shadow 420ms cubic-bezier(.65, .05, .36, 1);
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }

  .vis-newborn-toggle .vis-newborn-toggle-label {
    position: absolute;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    pointer-events: none;
    transition:
      opacity 280ms cubic-bezier(.65, .05, .36, 1),
      transform 420ms cubic-bezier(.65, .05, .36, 1);
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.12);
  }

  .vis-newborn-toggle .vis-newborn-toggle-label.is-off {
    right: 16px;
    color: var(--tg-label);
    opacity: 1;
    transform: translateX(0);
  }

  .vis-newborn-toggle .vis-newborn-toggle-label.is-on {
    left: 18px;
    color: var(--tg-label-on);
    opacity: 0;
    transform: translateX(-6px);
  }

  .vis-newborn-toggle .vis-newborn-toggle-handle {
    position: absolute;
    top: var(--tg-pad);
    left: var(--tg-pad);
    width: calc(var(--tg-h) - var(--tg-pad) * 2);
    height: calc(var(--tg-h) - var(--tg-pad) * 2);
    border-radius: 999px;
    background: radial-gradient(circle at 30% 28%, #f1f1f4 0%, var(--tg-handle) 55%, var(--tg-handle-deep) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.9),
      inset 0 -2px 4px rgba(0, 0, 0, 0.18),
      0 3px 8px rgba(0, 0, 0, 0.28),
      0 1px 2px rgba(0, 0, 0, 0.18);
    transition:
      transform 480ms cubic-bezier(.65, .05, .36, 1),
      width 380ms cubic-bezier(.65, .05, .36, 1);
    will-change: transform, width;
  }

  .vis-newborn-toggle .vis-newborn-toggle-handle::after {
    content: '';
    position: absolute;
    inset: 30%;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(0, 0, 0, 0.06) 0%, transparent 70%);
  }

  .vis-newborn-toggle:hover .vis-newborn-toggle-handle {
    width: calc(var(--tg-h) - var(--tg-pad) * 2 + 8px);
  }

  .vis-newborn-toggle.is-on:hover .vis-newborn-toggle-handle {
    width: calc(var(--tg-h) - var(--tg-pad) * 2 + 8px);
    transform: translateX(calc(var(--tg-w) - var(--tg-h) - 8px));
  }

  .vis-newborn-toggle:active .vis-newborn-toggle-handle {
    width: calc(var(--tg-h) - var(--tg-pad) * 2 + 14px);
  }

  .vis-newborn-toggle.is-on:active .vis-newborn-toggle-handle {
    width: calc(var(--tg-h) - var(--tg-pad) * 2 + 14px);
    transform: translateX(calc(var(--tg-w) - var(--tg-h) - 14px));
  }

  .vis-newborn-toggle.is-on {
    background: linear-gradient(180deg, var(--tg-on-bg) 0%, var(--tg-on-bg-deep) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.35),
      inset 0 -2px 6px rgba(0, 0, 0, 0.10),
      0 6px 18px -6px rgba(158, 201, 232, 0.65);
  }

  .vis-newborn-toggle.is-on .vis-newborn-toggle-handle {
    transform: translateX(calc(var(--tg-w) - var(--tg-h)));
  }

  .vis-newborn-toggle.is-on .vis-newborn-toggle-label.is-off {
    opacity: 0;
    transform: translateX(6px);
  }

  .vis-newborn-toggle.is-on .vis-newborn-toggle-label.is-on {
    opacity: 1;
    transform: translateX(0);
  }

  .vis-newborn-toggle:focus-visible {
    outline: 2px solid #9ec9e8;
    outline-offset: 3px;
  }

  .vis-newborn-toggle.size-small  { --tg-w:  96px; --tg-h: 42px; }
  .vis-newborn-toggle.size-medium { --tg-w: 132px; --tg-h: 56px; }
  .vis-newborn-toggle.size-large  { --tg-w: 180px; --tg-h: 76px; }

  .vis-newborn-toggle.size-small .vis-newborn-toggle-label {
    font-size: 12px;
  }
  .vis-newborn-toggle.size-small .vis-newborn-toggle-label.is-off {
    right: 12px;
  }
  .vis-newborn-toggle.size-small .vis-newborn-toggle-label.is-on {
    left: 14px;
  }

  .vis-newborn-toggle.size-large .vis-newborn-toggle-label {
    font-size: 19px;
  }
  .vis-newborn-toggle.size-large .vis-newborn-toggle-label.is-off {
    right: 22px;
  }
  .vis-newborn-toggle.size-large .vis-newborn-toggle-label.is-on {
    left: 24px;
  }

  .vis-widget.vis-newborn-toggle-size-small  { width: 110px !important; height:  56px !important; }
  .vis-widget.vis-newborn-toggle-size-medium { width: 150px !important; height:  72px !important; }
  .vis-widget.vis-newborn-toggle-size-large  { width: 200px !important; height:  96px !important; }

  .vis-newborn-toggle-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body.vis-edit-active .vis-widget.vis-newborn-toggle-wrap .vis-newborn-toggle-inner,
  body.vis-edit-active .vis-widget.vis-newborn-toggle-wrap .vis-newborn-toggle-inner * {
    pointer-events: none !important;
  }

  .vis-newborn-switch-tile .sw-name {

  .vis-newborn-switch-tile .sw-bottom {

  .vis-newborn-switch-tile .sw-pill .sw-pill-handle {

    left: 3px;

    height: 24px;

    transition: transform 240ms cubic-bezier(.65,.05,.36,1);

    transform: translateX(26px);
  }

  .vis-newborn-switch-tile .sw-pill .sw-pill-label {
    position: absolute;
    left: 10px;
    top: 0;
    bottom: 0;

    align-items: center;

    font-weight: 700;
    color: var(--sw-pill-label);

  .vis-newborn-switch-tile .sw-pill.is-on .sw-pill-label {

  body.vis-edit-active .vis-widget.vis-newborn-switch-wrap .vis-newborn-switch-tile,

  /* ============================================================== */
  /*  Time-setter widget (vis-newborn-time-*)                       */
  /*  Rectangular tile. Click opens a popup with a native           */
  /*  <input type="time"> picker. OK writes "HH:MM" string to oid.  */
  /*  Title is hardcoded to "Time" (per spec). Currently stored     */
  /*  value is shown on the right side of the tile.                 */
  /* ============================================================== */
  .vis-newborn-time-tile,
  .vis-newborn-time-tile *,
  .vis-newborn-time-tile *::before,
  .vis-newborn-time-tile *::after,
  .vis-newborn-time-popup,
  .vis-newborn-time-popup *,
  .vis-newborn-time-popup *::before,
  .vis-newborn-time-popup *::after {
    box-sizing: border-box;
  }

  .vis-newborn-time-tile {
    --tm-radius: 14px;
    --tm-bg-1: #ffffff;
    --tm-bg-2: #f5f5f8;
    --tm-text: #1c1c1e;
    --tm-text-muted: #6e6e74;
    --tm-icon-color: #6e6e74;
    --tm-accent: #0a84ff;

    position: relative;
    width: 100%;
    height: 100%;
    border-radius: var(--tm-radius);
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    background: linear-gradient(160deg, var(--tm-bg-1) 0%, var(--tm-bg-2) 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 0 0 1px rgba(0,0,0,0.04) inset,
      0 4px 14px -4px rgba(0,0,0,0.10);
    color: var(--tm-text);
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    transition: background 160ms ease, transform 100ms ease;
  }
  .vis-newborn-time-tile:hover {
    background: linear-gradient(160deg, #fafafd 0%, #f0f0f3 100%);
  }
  .vis-newborn-time-tile:active {
    transform: scale(0.98);
  }

  .vis-newborn-time-tile .tm-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex: 0 1 auto;
  }
  .vis-newborn-time-tile .tm-icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--tm-icon-color);
    flex-shrink: 0;
  }
  .vis-newborn-time-tile .tm-icon svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .vis-newborn-time-tile .tm-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: var(--tm-text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .vis-newborn-time-tile .tm-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--tm-text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .vis-newborn-time-tile .tm-value.is-empty {
    color: var(--tm-text-muted);
    font-weight: 500;
  }

  /* sizes */
  .vis-widget.vis-newborn-time-size-small  { width: 150px !important; height: 55px !important; }
  .vis-widget.vis-newborn-time-size-medium { width: 180px !important; height: 65px !important; }
  .vis-widget.vis-newborn-time-size-large  { width: 220px !important; height: 80px !important; }

  .vis-newborn-time-tile.size-small {
    padding: 0 12px;
    gap: 8px;
  }
  .vis-newborn-time-tile.size-small .tm-icon { width: 18px; height: 18px; }
  .vis-newborn-time-tile.size-small .tm-icon svg { width: 14px; height: 14px; }
  .vis-newborn-time-tile.size-small .tm-title { font-size: 12px; }
  .vis-newborn-time-tile.size-small .tm-value { font-size: 16px; }

  .vis-newborn-time-tile.size-large {
    padding: 0 20px;
    gap: 12px;
    border-radius: 18px;
  }
  .vis-newborn-time-tile.size-large .tm-icon { width: 28px; height: 28px; }
  .vis-newborn-time-tile.size-large .tm-icon svg { width: 22px; height: 22px; }
  .vis-newborn-time-tile.size-large .tm-title { font-size: 16px; }
  .vis-newborn-time-tile.size-large .tm-value { font-size: 22px; }

  body.vis-edit-active .vis-widget.vis-newborn-time-wrap .vis-newborn-time-tile,
  body.vis-edit-active .vis-widget.vis-newborn-time-wrap .vis-newborn-time-tile * {
    pointer-events: none !important;
  }

  /* ===== Time popup ===== */
  .vis-newborn-time-popup {
    position: fixed;
    inset: 0;
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0);
    -webkit-backdrop-filter: blur(0px);
    backdrop-filter: blur(0px);
    transition:
      background 220ms cubic-bezier(.65,.05,.36,1),
      backdrop-filter 220ms cubic-bezier(.65,.05,.36,1),
      -webkit-backdrop-filter 220ms cubic-bezier(.65,.05,.36,1);
    pointer-events: none;
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  .vis-newborn-time-popup.is-open {
    background: rgba(0,0,0,0.55);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    pointer-events: auto;
  }

  .vis-newborn-time-popup .tm-popup-card {
    position: relative;
    width: 280px;
    background: #ffffff;
    color: #1c1c1e;
    border-radius: 24px;
    padding: 20px 22px 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    transform: translateY(20px) scale(0.96);
    opacity: 0;
    transition:
      transform 280ms cubic-bezier(.2,.9,.3,1.2),
      opacity 220ms cubic-bezier(.65,.05,.36,1);
  }
  .vis-newborn-time-popup.is-open .tm-popup-card {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .vis-newborn-time-popup .tm-popup-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f2f2f7;
    color: #6e6e74;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    transition: background 0.18s ease, color 0.18s ease;
    font-family: inherit;
  }
  .vis-newborn-time-popup .tm-popup-close:hover {
    background: #e5e5ea;
    color: #1c1c1e;
  }

  .vis-newborn-time-popup .tm-popup-title {
    font-size: 14px;
    font-weight: 600;
    margin: 0 30px 14px 0;
    letter-spacing: -0.2px;
  }

  .vis-newborn-time-popup .tm-popup-input-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }
  .vis-newborn-time-popup .tm-popup-input {
    font-family: inherit;
    font-size: 32px;
    font-weight: 300;
    color: #1c1c1e;
    background: #f2f2f7;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    width: 100%;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    -moz-appearance: textfield;
  }
  .vis-newborn-time-popup .tm-popup-input:focus {
    outline: none;
    border-color: #0a84ff;
    background: #fff;
  }

  .vis-newborn-time-popup .tm-popup-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .vis-newborn-time-popup .tm-popup-btn {
    height: 38px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.08);
    background: #f2f2f7;
    color: #1c1c1e;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 160ms ease, transform 100ms ease;
  }
  .vis-newborn-time-popup .tm-popup-btn:hover {
    background: #e5e5ea;
  }
  .vis-newborn-time-popup .tm-popup-btn:active {
    transform: scale(0.97);
  }
  .vis-newborn-time-popup .tm-popup-btn.is-primary {
    background: #0a84ff;
    color: #fff;
    border-color: #0a84ff;
  }
  .vis-newborn-time-popup .tm-popup-btn.is-primary:hover {
    background: #0070e0;
  }

  /* ============================================================== */
  /*  Camera Tile widget (vis-newborn-camera-*)                     */
  /* ============================================================== */
  .vis-newborn-camera-wrap,
  .vis-newborn-camera-wrap *,
  .vis-newborn-camera-wrap *::before,
  .vis-newborn-camera-wrap *::after {
    box-sizing: border-box;
  }

  .vis-newborn-camera {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #1a1c22;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #fff;

  .vis-newborn-camera__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;

  .vis-newborn-camera__img.is-hidden {
    display: none;

  .vis-newborn-camera__placeholder {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;

    font-size: 32px;

  .vis-newborn-camera__topbar > * {

  .vis-newborn-camera__max {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.32);

    -webkit-backdrop-filter: blur(8px) saturate(140%);
    color: #fff;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s ease, transform 0.1s ease;

  .vis-newborn-camera__max:hover {
    background: rgba(20, 22, 28, 0.65);

  .vis-newborn-camera__max:active {
    transform: scale(0.94);
  }

  .vis-newborn-camera__title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(20, 22, 28, 0.45);
    backdrop-filter: blur(8px) saturate(140%);
    -webkit-backdrop-filter: blur(8px) saturate(140%);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    max-width: 50%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vis-newborn-camera__title:empty {
    display: none;
  }

  .vis-newborn-camera__slots {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 2;
    max-height: calc(100% - 20px);
  }

  .vis-newborn-camera__slot {
    --slot-color: #ffc857;
    width: 44px;
    height: 44px;
    min-width: 44px;
    min-height: 44px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.32);
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(8px) saturate(140%);
    -webkit-backdrop-filter: blur(8px) saturate(140%);
    color: #fff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.1s ease, color 0.18s ease;
  }
  .vis-newborn-camera__slot--hidden {
    display: none !important;
  }
  .vis-newborn-camera__slot:hover {
    background: rgba(255, 255, 255, 0.28);
  }
  .vis-newborn-camera__slot:active,
  .vis-newborn-camera__slot.is-pulsing {
    transform: scale(0.94);
    background: var(--slot-color);
    color: #1a1c22;
    box-shadow: 0 0 18px var(--slot-color);
  }
  .vis-newborn-camera__slot.is-active {
    background: var(--slot-color);
    color: #1a1c22;
    border-color: rgba(0, 0, 0, 0.15);
    box-shadow: 0 0 18px var(--slot-color);
  }
  .vis-newborn-camera__slot img {
    width: 22px;
    height: 22px;
    object-fit: contain;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
  }
  .vis-newborn-camera__slot.is-active img {
    filter: none;
  }
  .vis-newborn-camera__slot svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
  }
  .vis-newborn-camera__slot.is-active svg {
    filter: none;
  }
  .vis-newborn-camera__max svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .vis-newborn-camera__placeholder svg {
    width: 38px;
    height: 38px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.6;
  }

  /* ----- Lightbox overlay ----- */
  .vis-newborn-camera-lightbox {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    padding: 24px;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    animation: vnCameraLightboxFade 0.18s ease-out;

  @keyframes vnCameraLightboxFade {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
  .vis-newborn-camera-lightbox__title {
    font-size: 16px;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }
  .vis-newborn-camera-lightbox__title:empty {
    display: none;
  }
  .vis-newborn-camera-lightbox__inner {
    max-width: 95vw;
    max-height: 85vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
  }
  .vis-newborn-camera-lightbox__img {
    display: block;
    max-width: 95vw;
    max-height: 85vh;
    width: auto;
    height: auto;

<!-- ====================================================================
     Shared JS — vis.binds["newborn"]
     ==================================================================== -->
<script type="text/javascript">
  (function () {
    vis.binds["newborn"] = vis.binds["newborn"] || {};
    var ns = vis.binds["newborn"];

    // ===== Helpers (closure-private) =====
    function isOn(val) {
      if (val && typeof val === "object" && "val" in val) {
        val = val.val;
      }
      return val === true || val === "true" || val === 1 || val === "1" || val === "ON" || val === "on";
    }

    function toPct(val) {
      if (val && typeof val === "object" && "val" in val) {
        val = val.val;
      }
      var n = parseFloat(val);
      if (!isFinite(n)) {
        n = 0;
      }
      if (n < 0) {
        n = 0;
      }
      if (n > 100) {
        n = 100;
      }
      return Math.round(n);
    }

    // ===== Toggle handler =====
    /**
     * Bound per element via CanJS arrow syntax inside the EJS template:
     *   <%= (el) -> vis.binds['newborn'].toggle(el) %>
     *
     * Auto-detect KNX-mode (same convention as the Light widget):
     *   - oid_status set   → 2-DP mode (write to oid, read from oid_status)
     *   - oid_status empty → 1-DP mode (oid bidirectional)
     * invert_status only applies when oid_status is set.
     *
     * State subscription is automatic: visUtils.getUsedObjectIDs picks up
     * any widget.data attribute matching /^oid/ (also `oid_status`).
     */
    ns.toggle = function (el) {
      var $this = $(el);
      var oid       = $this.data("oid");
      var oidStatus = $this.data("oid-status");
      var invert    = ($this.data("invert") === true || $this.data("invert") === "true");

      if (!oid || vis.editMode) {
        return;
      }

      var oidRead = oidStatus || oid;
      var $tgl = $this.find(".vis-newborn-toggle");
      var moved = false;

      function applyState(rawVal) {
        var on = isOn(rawVal);
        if (oidStatus && invert) {
          on = !on;
        }
        $tgl.toggleClass("is-on", on);
        $tgl.attr("aria-checked", on ? "true" : "false");
      }

      function onStateChange(e, newVal) {
        applyState(newVal);
      }

      applyState(vis.states[oidRead + ".val"]);
      vis.states.bind(oidRead + ".val", onStateChange);

      $this.on("click.newbornToggle touchend.newbornToggle", function () {
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          return;
        }
        if (moved) {
          return;
        }

        var current = vis.states[oidRead + ".val"];
        var on = isOn(current);
        if (oidStatus && invert) {
          on = !on;
        }
        var next = !on;
        var writeValue = (oidStatus && invert) ? !next : next;

        vis.setValue(oid, writeValue);
      });
      $this.on("touchmove.newbornToggle", function () {
        moved = true;
      });
      $this.on("touchstart.newbornToggle", function () {
        moved = false;
      });

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornToggle");
        if (vis.states.unbind) {
          vis.states.unbind(oidRead + ".val", onStateChange);
        }
      });
    };

    // ===== Dimmer handler (long-press → vertical slider popup) =====
    var sharedPopup = null;

    function ensurePopup() {
      if (sharedPopup) {
        return sharedPopup;
      }
      var popup = document.createElement("div");
      popup.className = "vis-newborn-dimmer-popup";
      popup.innerHTML = [
        '<div class="nd-popup-card">',
        '  <button type="button" class="nd-popup-close" aria-label="Schliessen">&times;</button>',
        '  <div class="nd-popup-title">Lampe</div>',
        '  <div class="nd-popup-percent"><span class="nd-popup-pct">0</span><span class="nd-popup-unit">%</span></div>',
        '  <div class="nd-slider">',
        '    <div class="nd-slider-fill"></div>',
        '    <div class="nd-slider-handle"></div>',
        '  </div>',
        '</div>'
      ].join("");
      document.body.appendChild(popup);
      sharedPopup = popup;
      return popup;
    }

    function renderPopup(popup, pct) {
      var fill = popup.querySelector(".nd-slider-fill");
      var handle = popup.querySelector(".nd-slider-handle");
      var pctEl = popup.querySelector(".nd-popup-pct");
      fill.style.height = pct + "%";
      handle.style.bottom = pct + "%";
      handle.style.opacity = pct > 0 ? "1" : "0";
      pctEl.textContent = pct;
    }

    function openPopup(ctx) {
      var popup = ensurePopup();
      var slider = popup.querySelector(".nd-slider");
      var closeBtn = popup.querySelector(".nd-popup-close");
      var titleEl = popup.querySelector(".nd-popup-title");

      titleEl.textContent = ctx.name || "Lampe";

      var on = isOn(vis.states[ctx.readOn + ".val"]);
      var pct = toPct(vis.states[ctx.readPct + ".val"]);
      var displayed = on ? pct : 0;
      renderPopup(popup, displayed);

      var dragging = false;
      var lastWritten = -1;

      function clamp(v) {
        if (v < 0) {
          return 0;
        }
        if (v > 100) {
          return 100;
        }
        return v;
      }

      function pctFromEvent(e) {
        var rect = slider.getBoundingClientRect();
        var clientY;
        if (e.touches && e.touches.length) {
          clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length) {
          clientY = e.changedTouches[0].clientY;
        } else {
          clientY = e.clientY;
        }
        var rel = (rect.bottom - clientY) / rect.height;
        return clamp(Math.round(rel * 100));
      }

      // Visual-only update during drag — vis.setValue is called once on
      // pointerUp. Avoids spamming the bus while the user moves the slider.
      function onPointerDown(e) {
        dragging = true;
        if (e.cancelable) {
          e.preventDefault();
        }
        renderPopup(popup, pctFromEvent(e));
      }

      function onPointerMove(e) {
        if (!dragging) {
          return;
        }
        if (e.cancelable) {
          e.preventDefault();
        }
        renderPopup(popup, pctFromEvent(e));
      }

      function onPointerUp(e) {
        if (!dragging) {
          return;
        }
        dragging = false;
        var p = pctFromEvent(e);
        renderPopup(popup, p);
        if (p !== lastWritten && ctx.oidDimCmd) {
          vis.setValue(ctx.oidDimCmd, p);
          lastWritten = p;
        }
      }

      var passiveFalse = {
        passive: false
      };

      slider.addEventListener("mousedown", onPointerDown);
      slider.addEventListener("touchstart", onPointerDown, passiveFalse);
      document.addEventListener("mousemove", onPointerMove);
      document.addEventListener("touchmove", onPointerMove, passiveFalse);
      document.addEventListener("mouseup", onPointerUp);
      document.addEventListener("touchend", onPointerUp);
      document.addEventListener("touchcancel", onPointerUp);

      function close() {
        popup.classList.remove("is-open");
        slider.removeEventListener("mousedown", onPointerDown);
        slider.removeEventListener("touchstart", onPointerDown, passiveFalse);
        document.removeEventListener("mousemove", onPointerMove);
        document.removeEventListener("touchmove", onPointerMove, passiveFalse);
        document.removeEventListener("mouseup", onPointerUp);
        document.removeEventListener("touchend", onPointerUp);
        document.removeEventListener("touchcancel", onPointerUp);
        popup.removeEventListener("click", onBackdropClick);
        closeBtn.removeEventListener("click", onCloseClick);
        ctx.popupOnExternalUpdate = null;
      }

      function onBackdropClick(e) {
        if (e.target === popup) {
          close();
        }
      }

      function onCloseClick(e) {
        e.stopPropagation();
        close();
      }

      popup.addEventListener("click", onBackdropClick);
      closeBtn.addEventListener("click", onCloseClick);

      ctx.popupOnExternalUpdate = function (newPct, isStillOn) {
        if (dragging) {
          return;
        }
        var v = isStillOn ? newPct : 0;
        renderPopup(popup, v);
      };

      requestAnimationFrame(function () {
        popup.classList.add("is-open");
      });
    }

    ns.dimmer = function (el) {
      var $this = $(el);
      var oidSwitchCmd   = $this.data("oid-switch-cmd");
      var oidSwitchState = $this.data("oid-switch-state");
      var oidDimCmd      = $this.data("oid-dim-cmd");
      var oidDimState    = $this.data("oid-dim-state");
      var oidRelDimCmd   = $this.data("oid-rel-dim-cmd");
      var name           = $this.data("nd-name") || "Lampe";

      if (vis.editMode) {
        return;
      }
      if (!oidSwitchCmd && !oidDimCmd && !oidRelDimCmd) {
        return;
      }

      var readOn  = oidSwitchState || oidSwitchCmd;
      var readPct = oidDimState    || oidDimCmd;

      var ctx = {
        oidSwitchCmd: oidSwitchCmd,
        oidSwitchState: oidSwitchState,
        oidDimCmd: oidDimCmd,
        oidDimState: oidDimState,
        name: name,
        readOn: readOn,
        readPct: readPct,
        popupOnExternalUpdate: null
      };

      var $tile = $this.find(".vis-newborn-dimmer-tile");
      var $pct  = $this.find(".nd-pct");

      function applyState() {
        var on  = isOn(vis.states[readOn  + ".val"]);
        var pct = toPct(vis.states[readPct + ".val"]);
        $tile.toggleClass("is-on", on);
        $tile.attr("aria-pressed", on ? "true" : "false");
        $pct.text(on ? pct : 0);
        if (ctx.popupOnExternalUpdate) {
          ctx.popupOnExternalUpdate(pct, on);
        }
      }

      function onStateChange(e, val) {
        applyState();
      }

      applyState();

      if (readOn) {
        vis.states.bind(readOn + ".val", onStateChange);
      }
      if (readPct && readPct !== readOn) {
        vis.states.bind(readPct + ".val", onStateChange);
      }

      // ===== Long-press detection =====
      var pressTimer = null;
      var longPressed = false;
      var moved = false;
      var startX = 0;
      var startY = 0;
      var pressedAction = null;
      var LONG_PRESS_MS = 500;
      var MOVE_TOL = 12;

      // jQuery wraps native events but does NOT proxy `touches`/`changedTouches`
      // onto the wrapper — must read those off `originalEvent`. Reading `e.touches`
      // directly returns undefined on jQuery touch events and silently breaks the
      // entire touch path (was the cause of v0.1.1 mobile-tap not working).
      function getXY(e) {
        var oe = e.originalEvent || e;
        if (oe.touches && oe.touches.length) {
          return [oe.touches[0].clientX, oe.touches[0].clientY];
        }
        if (oe.changedTouches && oe.changedTouches.length) {
          return [oe.changedTouches[0].clientX, oe.changedTouches[0].clientY];
        }
        return [e.clientX || 0, e.clientY || 0];
      }

      function startPress(e) {
        var p = getXY(e);
        longPressed = false;
        moved = false;
        startX = p[0];
        startY = p[1];
        var btn = $(e.target).closest("[data-nd-action]")[0];
        pressedAction = btn ? btn.getAttribute("data-nd-action") : null;
        // Press on a +/- button: no long-press timer, no toggle.
        if (pressedAction) {
          return;
        }
        pressTimer = setTimeout(function () {
          longPressed = true;
          pressTimer = null;
          openPopup(ctx);
        }, LONG_PRESS_MS);
      }

      function cancelPress() {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      }

      function onPressStart(e) {
        if (e.type === "mousedown" && e.button !== undefined && e.button !== 0) {
          return;
        }
        startPress(e);
      }

      function onPressMove(e) {
        if (pressTimer === null && !longPressed) {
          return;
        }
        var p = getXY(e);
        if (Math.abs(p[0] - startX) > MOVE_TOL || Math.abs(p[1] - startY) > MOVE_TOL) {
          moved = true;
          cancelPress();
        }
      }

      function performRelDim(action) {
        if (!oidRelDimCmd) {
          return;
        }
        if (action === "dim-up") {
          vis.setValue(oidRelDimCmd, true);
        } else if (action === "dim-down") {
          vis.setValue(oidRelDimCmd, false);
        }
      }

      function onRelease(e) {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
        if (longPressed || moved) {
          longPressed = false;
          moved = false;
          pressedAction = null;
          return;
        }
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          pressedAction = null;
          return;
        }
        if (pressedAction) {
          performRelDim(pressedAction);
          pressedAction = null;
          return;
        }
        var current = isOn(vis.states[readOn + ".val"]);
        if (oidSwitchCmd) {
          vis.setValue(oidSwitchCmd, !current);
        }
      }

      $this.on("mousedown.newbornDimmer touchstart.newbornDimmer", onPressStart);
      $this.on("mousemove.newbornDimmer touchmove.newbornDimmer", onPressMove);
      $this.on("mouseup.newbornDimmer mouseleave.newbornDimmer touchend.newbornDimmer touchcancel.newbornDimmer", onRelease);

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornDimmer");
        cancelPress();
        if (vis.states.unbind) {
          if (readOn) {
            vis.states.unbind(readOn + ".val", onStateChange);
          }
          if (readPct && readPct !== readOn) {
            vis.states.unbind(readPct + ".val", onStateChange);
          }
        }
      });
    };

    // ===== Light handler =====
    /**
     * Pure on/off light. Click toggles state. KNX-mode is auto-detected
     * from the data attributes:
     *   - oid_status set   → 2-DP mode (write to oid, read from oid_status)
     *   - oid_status empty → 1-DP mode (oid bidirectional)
     * invert_status only takes effect in 2-DP mode (mirrors both directions).
     *
     * Same touch+click pattern as the toggle widget — proven on PC and mobile.
     */
    ns.light = function (el) {
      var $this = $(el);
      var oid       = $this.data("oid");
      var oidStatus = $this.data("oid-status");
      var invert    = ($this.data("invert") === true || $this.data("invert") === "true");

      if (!oid || vis.editMode) {
        return;
      }

      var oidRead = oidStatus || oid;
      var $tile = $this.find(".vis-newborn-light-tile");
      var moved = false;

      function applyState(rawVal) {
        var on = isOn(rawVal);
        if (oidStatus && invert) {
          on = !on;
        }
        $tile.toggleClass("is-on", on);
        $tile.attr("aria-checked", on ? "true" : "false");
      }

      function onStateChange(e, newVal) {
        applyState(newVal);
      }

      applyState(vis.states[oidRead + ".val"]);
      vis.states.bind(oidRead + ".val", onStateChange);

      $this.on("click.newbornLight touchend.newbornLight", function () {
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          return;
        }
        if (moved) {
          return;
        }

        var current = vis.states[oidRead + ".val"];
        var on = isOn(current);
        if (oidStatus && invert) {
          on = !on;
        }
        var next = !on;
        var writeValue = (oidStatus && invert) ? !next : next;

        vis.setValue(oid, writeValue);
      });
      $this.on("touchmove.newbornLight", function () {
        moved = true;
      });
      $this.on("touchstart.newbornLight", function () {
        moved = false;
      });

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornLight");
        if (vis.states.unbind) {
          vis.states.unbind(oidRead + ".val", onStateChange);
        }
      });
    };

    // ===== Blinds handler (Jalousie + Lamellen, with long-press popup) =====
    var sharedBlindsPopup = null;

    function ensureBlindsPopup() {
      if (sharedBlindsPopup) {
        return sharedBlindsPopup;
      }
      var popup = document.createElement("div");
      popup.className = "vis-newborn-blinds-popup";
      popup.innerHTML = [
        '<div class="bl-popup-card">',
        '  <button type="button" class="bl-popup-close" aria-label="Schliessen">&times;</button>',
        '  <div class="bl-popup-title">Jalousie</div>',
        '  <div class="bl-popup-sliders">',
        '    <div class="bl-popup-slot">',
        '      <div class="bl-popup-label">Jalousie</div>',
        '      <div class="bl-popup-pct"><span class="bl-popup-pct-jal">0</span><span class="bl-popup-unit">%</span></div>',
        '      <div class="bl-slider" data-bl-slider="blinds">',
        '        <div class="bl-slider-fill"></div>',
        '        <div class="bl-slider-handle"></div>',
        '      </div>',
        '    </div>',
        '    <div class="bl-popup-slot">',
        '      <div class="bl-popup-label">Lamellen</div>',
        '      <div class="bl-popup-pct"><span class="bl-popup-pct-lam">0</span><span class="bl-popup-unit">%</span></div>',
        '      <div class="bl-slider" data-bl-slider="slats">',
        '        <div class="bl-slider-fill"></div>',
        '        <div class="bl-slider-handle"></div>',
        '      </div>',
        '    </div>',
        '  </div>',
        '  <button type="button" class="bl-popup-stop" aria-label="Stop">',
        '    <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>',
        '    Stop',
        '  </button>',
        '</div>'
      ].join("");
      document.body.appendChild(popup);
      sharedBlindsPopup = popup;
      return popup;
    }

    function clampPct(v) {
      if (v < 0) {
        return 0;
      }
      if (v > 100) {
        return 100;
      }
      return v;
    }

    function renderBlindsPopup(popup, blindsPct, slatsPct) {
      var b = clampPct(blindsPct);
      var s = clampPct(slatsPct);
      popup.querySelector(".bl-popup-pct-jal").textContent = b;
      popup.querySelector(".bl-popup-pct-lam").textContent = s;
      var sliders = popup.querySelectorAll(".bl-slider");
      var blFill = sliders[0].querySelector(".bl-slider-fill");
      var blHandle = sliders[0].querySelector(".bl-slider-handle");
      var slFill = sliders[1].querySelector(".bl-slider-fill");
      var slHandle = sliders[1].querySelector(".bl-slider-handle");
      blFill.style.height = b + "%";
      blHandle.style.bottom = b + "%";
      blHandle.style.opacity = b > 0 ? "1" : "0";
      slFill.style.height = s + "%";
      slHandle.style.bottom = s + "%";
      slHandle.style.opacity = s > 0 ? "1" : "0";
    }

    function openBlindsPopup(ctx) {
      var popup = ensureBlindsPopup();
      var closeBtn = popup.querySelector(".bl-popup-close");
      var titleEl = popup.querySelector(".bl-popup-title");
      var blindsSlider = popup.querySelector('[data-bl-slider="blinds"]');
      var slatsSlider = popup.querySelector('[data-bl-slider="slats"]');
      var stopBtn = popup.querySelector(".bl-popup-stop");

      titleEl.textContent = ctx.name || "Jalousie";

      var blindsPct = toPct(vis.states[ctx.readBlinds + ".val"]);
      var slatsPct = toPct(vis.states[ctx.readSlats + ".val"]);
      renderBlindsPopup(popup, blindsPct, slatsPct);

      var dragging = null;
      var lastWrittenBlinds = -1;
      var lastWrittenSlats = -1;

      function pctFromEvent(slider, e) {
        var rect = slider.getBoundingClientRect();
        var clientY;
        if (e.touches && e.touches.length) {
          clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length) {
          clientY = e.changedTouches[0].clientY;
        } else {
          clientY = e.clientY;
        }
        var rel = (rect.bottom - clientY) / rect.height;
        return clampPct(Math.round(rel * 100));
      }

      // Visual-only update during drag — the actual vis.setValue write
      // happens once on pointerUp. Avoids spamming the KNX bus with every
      // intermediate slider position; user sees it as a smooth UI but
      // gets exactly one write per gesture.
      function previewDrag(which, p) {
        if (which === "blinds") {
          ctx.popupCurrentBlinds = p;
          renderBlindsPopup(popup, p, ctx.popupCurrentSlats);
        } else {
          ctx.popupCurrentSlats = p;
          renderBlindsPopup(popup, ctx.popupCurrentBlinds, p);
        }
      }

      ctx.popupCurrentBlinds = blindsPct;
      ctx.popupCurrentSlats = slatsPct;

      function onPointerDown(e) {
        var slider = e.currentTarget;
        var which = slider.getAttribute("data-bl-slider");
        dragging = which;
        if (e.cancelable) {
          e.preventDefault();
        }
        var p = pctFromEvent(slider, e);
        previewDrag(which, p);
      }

      function onPointerMove(e) {
        if (!dragging) {
          return;
        }
        if (e.cancelable) {
          e.preventDefault();
        }
        var slider = dragging === "blinds" ? blindsSlider : slatsSlider;
        var p = pctFromEvent(slider, e);
        previewDrag(dragging, p);
      }

      function onPointerUp(e) {
        if (!dragging) {
          return;
        }
        var slider = dragging === "blinds" ? blindsSlider : slatsSlider;
        var p = pctFromEvent(slider, e);
        var which = dragging;
        previewDrag(which, p);
        dragging = null;
        // Single write per gesture, on release only.
        if (which === "blinds" && p !== lastWrittenBlinds && ctx.oidBlindsPosCmd) {
          vis.setValue(ctx.oidBlindsPosCmd, p);
          lastWrittenBlinds = p;
        } else if (which === "slats" && p !== lastWrittenSlats && ctx.oidSlatsPosCmd) {
          vis.setValue(ctx.oidSlatsPosCmd, p);
          lastWrittenSlats = p;
        }
      }

      var passiveFalse = {
        passive: false
      };

      blindsSlider.addEventListener("mousedown", onPointerDown);
      blindsSlider.addEventListener("touchstart", onPointerDown, passiveFalse);
      slatsSlider.addEventListener("mousedown", onPointerDown);
      slatsSlider.addEventListener("touchstart", onPointerDown, passiveFalse);
      document.addEventListener("mousemove", onPointerMove);
      document.addEventListener("touchmove", onPointerMove, passiveFalse);
      document.addEventListener("mouseup", onPointerUp);
      document.addEventListener("touchend", onPointerUp);
      document.addEventListener("touchcancel", onPointerUp);

      function close() {
        popup.classList.remove("is-open");
        blindsSlider.removeEventListener("mousedown", onPointerDown);
        blindsSlider.removeEventListener("touchstart", onPointerDown, passiveFalse);
        slatsSlider.removeEventListener("mousedown", onPointerDown);
        slatsSlider.removeEventListener("touchstart", onPointerDown, passiveFalse);
        document.removeEventListener("mousemove", onPointerMove);
        document.removeEventListener("touchmove", onPointerMove, passiveFalse);
        document.removeEventListener("mouseup", onPointerUp);
        document.removeEventListener("touchend", onPointerUp);
        document.removeEventListener("touchcancel", onPointerUp);
        popup.removeEventListener("click", onBackdropClick);
        closeBtn.removeEventListener("click", onCloseClick);
        stopBtn.removeEventListener("click", onStopClick);
        ctx.popupOnExternalUpdate = null;
      }

      function onBackdropClick(e) {
        if (e.target === popup) {
          close();
        }
      }

      function onCloseClick(e) {
        e.stopPropagation();
        close();
      }

      function onStopClick(e) {
        e.stopPropagation();
        if (ctx.oidSlatsCmd) {
          vis.setValue(ctx.oidSlatsCmd, true);
        }
      }

      popup.addEventListener("click", onBackdropClick);
      closeBtn.addEventListener("click", onCloseClick);
      stopBtn.addEventListener("click", onStopClick);

      ctx.popupOnExternalUpdate = function (newBlindsPct, newSlatsPct) {
        if (dragging) {
          return;
        }
        ctx.popupCurrentBlinds = newBlindsPct;
        ctx.popupCurrentSlats = newSlatsPct;
        renderBlindsPopup(popup, newBlindsPct, newSlatsPct);
      };

      requestAnimationFrame(function () {
        popup.classList.add("is-open");
      });
    }

    /**
     * Per-element handler. State subscription is automatic for all six
     * widget.data attribute names that start with `oid` (visUtils regex).
     *
     * Click on any of the 5 buttons (jal-up/down, lam-up/down, stop)
     * triggers the corresponding setValue. Long-press (≥500 ms) opens
     * the slider popup. Movement during press cancels the timer.
     */
    ns.blinds = function (el) {
      var $this = $(el);
      var oidBlindsCmd      = $this.data("oid-blinds-cmd");
      var oidBlindsPosCmd   = $this.data("oid-blinds-pos-cmd");
      var oidBlindsPosState = $this.data("oid-blinds-pos-state");
      var oidSlatsCmd       = $this.data("oid-slats-cmd");
      var oidSlatsPosCmd    = $this.data("oid-slats-pos-cmd");
      var oidSlatsPosState  = $this.data("oid-slats-pos-state");
      var oidWindowState    = $this.data("oid-window-state");
      var name              = $this.data("bl-name") || "Jalousie";

      if (vis.editMode) {
        return;
      }
      if (!oidBlindsCmd && !oidSlatsCmd && !oidBlindsPosCmd && !oidSlatsPosCmd) {
        return;
      }

      var readBlinds = oidBlindsPosState || oidBlindsPosCmd;
      var readSlats  = oidSlatsPosState  || oidSlatsPosCmd;

      var ctx = {
        oidBlindsPosCmd: oidBlindsPosCmd,
        oidSlatsPosCmd: oidSlatsPosCmd,
        oidSlatsCmd: oidSlatsCmd,
        readBlinds: readBlinds,
        readSlats: readSlats,
        name: name,
        popupOnExternalUpdate: null,
        popupCurrentBlinds: 0,
        popupCurrentSlats: 0
      };

      var $pctJal = $this.find(".bl-pct-jal");
      var $badge  = $this.find(".bl-badge");

      function applyState() {
        var bp = 0;
        var sp = 0;
        if (readBlinds) {
          bp = toPct(vis.states[readBlinds + ".val"]);
          $pctJal.text(bp);
        }
        if (readSlats) {
          sp = toPct(vis.states[readSlats + ".val"]);
        }
        if (oidWindowState) {
          var open = isOn(vis.states[oidWindowState + ".val"]);
          $badge
            .addClass("is-shown")
            .toggleClass("is-open", open)
            .toggleClass("is-closed", !open)
            .text(open ? "offen" : "zu");
        } else {
          $badge.removeClass("is-shown is-open is-closed").text("");
        }
        if (ctx.popupOnExternalUpdate) {
          ctx.popupOnExternalUpdate(bp, sp);
        }
      }

      function onStateChange(e, val) {
        applyState();
      }

      applyState();

      if (readBlinds) {
        vis.states.bind(readBlinds + ".val", onStateChange);
      }
      if (readSlats && readSlats !== readBlinds) {
        vis.states.bind(readSlats + ".val", onStateChange);
      }
      if (oidWindowState) {
        vis.states.bind(oidWindowState + ".val", onStateChange);
      }

      // ===== Press detection (click button vs. long-press popup) =====
      var pressTimer = null;
      var longPressed = false;
      var moved = false;
      var startX = 0;
      var startY = 0;
      var pressedAction = null;
      var LONG_PRESS_MS = 500;
      var MOVE_TOL = 12;

      function getXY(e) {
        var oe = e.originalEvent || e;
        if (oe.touches && oe.touches.length) {
          return [oe.touches[0].clientX, oe.touches[0].clientY];
        }
        if (oe.changedTouches && oe.changedTouches.length) {
          return [oe.changedTouches[0].clientX, oe.changedTouches[0].clientY];
        }
        return [e.clientX || 0, e.clientY || 0];
      }

      function startPress(e) {
        var p = getXY(e);
        longPressed = false;
        moved = false;
        startX = p[0];
        startY = p[1];
        var btn = $(e.target).closest("[data-bl-action]")[0];
        pressedAction = btn ? btn.getAttribute("data-bl-action") : null;
        pressTimer = setTimeout(function () {
          longPressed = true;
          pressTimer = null;
          openBlindsPopup(ctx);
        }, LONG_PRESS_MS);
      }

      function cancelPress() {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      }

      function onPressStart(e) {
        if (e.type === "mousedown" && e.button !== undefined && e.button !== 0) {
          return;
        }
        startPress(e);
      }

      function onPressMove(e) {
        if (pressTimer === null && !longPressed) {
          return;
        }
        var p = getXY(e);
        if (Math.abs(p[0] - startX) > MOVE_TOL || Math.abs(p[1] - startY) > MOVE_TOL) {
          moved = true;
          cancelPress();
        }
      }

      // KNX convention (per user spec):
      //   Jalousien true/1 = ab,  false/0 = auf
      //   Lamellen  true/1 = ab,  false/0 = auf  (any value also stops the blind)
      // The Stop button writes `true` to the slats DP (= "ab"), which on KNX
      // stops a moving blind and steps the slats slightly down.
      function performAction(action) {
        switch (action) {
          case "jal-up":
            if (oidBlindsCmd) {
              vis.setValue(oidBlindsCmd, false);
            }
            break;
          case "jal-down":
            if (oidBlindsCmd) {
              vis.setValue(oidBlindsCmd, true);
            }
            break;
          case "lam-up":
            if (oidSlatsCmd) {
              vis.setValue(oidSlatsCmd, false);
            }
            break;
          case "lam-down":
            if (oidSlatsCmd) {
              vis.setValue(oidSlatsCmd, true);
            }
            break;
          case "stop":
            if (oidSlatsCmd) {
              vis.setValue(oidSlatsCmd, true);
            }
            break;
        }
      }

      function onRelease(e) {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
        if (longPressed || moved) {
          longPressed = false;
          moved = false;
          pressedAction = null;
          return;
        }
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          pressedAction = null;
          return;
        }
        if (pressedAction) {
          performAction(pressedAction);
          pressedAction = null;
        }
      }

      $this.on("mousedown.newbornBlinds touchstart.newbornBlinds", onPressStart);
      $this.on("mousemove.newbornBlinds touchmove.newbornBlinds", onPressMove);
      $this.on("mouseup.newbornBlinds mouseleave.newbornBlinds touchend.newbornBlinds touchcancel.newbornBlinds", onRelease);

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornBlinds");
        cancelPress();
        if (vis.states.unbind) {
          if (readBlinds) {
            vis.states.unbind(readBlinds + ".val", onStateChange);
          }
          if (readSlats && readSlats !== readBlinds) {
            vis.states.unbind(readSlats + ".val", onStateChange);
          }
          if (oidWindowState) {
            vis.states.unbind(oidWindowState + ".val", onStateChange);
          }
        }
      });
    };

    // ===== Heizung handler (Soll/Ist + ± buttons + long-press abs popup) =====
    var sharedHeatPopup = null;

    function ensureHeatPopup() {
      if (sharedHeatPopup) {
        return sharedHeatPopup;
      }
      var popup = document.createElement("div");
      popup.className = "vis-newborn-heat-popup";
      popup.innerHTML = [
        '<div class="hp-popup-card">',
        '  <button type="button" class="hp-popup-close" aria-label="Schliessen">&times;</button>',
        '  <div class="hp-popup-title">Heizung</div>',
        '  <div class="hp-popup-ist">Ist<span class="hp-popup-ist-val">--</span></div>',
        '  <div class="hp-popup-temp"><span class="hp-popup-soll">--</span><span class="hp-popup-unit">°C</span></div>',
        '  <div class="hp-slider">',
        '    <div class="hp-slider-fill"></div>',
        '    <div class="hp-slider-handle"></div>',
        '  </div>',
        '</div>'
      ].join("");
      document.body.appendChild(popup);
      sharedHeatPopup = popup;
      return popup;
    }

    // Sliderbereich der Heizungs-UI: 5–30 °C in 0.5er Schritten.
    // Schreibt aufs cmd nur Float-Werte; ob KNX dem folgt oder selbst clampt,
    // ist Sache des KNX-Geräts (User-Vorgabe: "min max wird in knx festgelegt").
    var HEAT_MIN = 5;
    var HEAT_MAX = 30;
    var HEAT_STEP = 0.5;

    function clampHeat(v) {
      if (v < HEAT_MIN) {
        return HEAT_MIN;
      }
      if (v > HEAT_MAX) {
        return HEAT_MAX;
      }
      return v;
    }

    function snapHeat(v) {
      return Math.round(v / HEAT_STEP) * HEAT_STEP;
    }

    function fmtTemp(v) {
      if (v === null || v === undefined || isNaN(v)) {
        return "--";
      }
      var n = Math.round(v * 10) / 10;
      var s = n.toFixed(1);
      return s.replace(/\.0$/, ".0");
    }

    function renderHeatPopup(popup, sollVal, istVal) {
      var clamped = clampHeat(sollVal);
      var pct = (clamped - HEAT_MIN) / (HEAT_MAX - HEAT_MIN) * 100;
      var fill = popup.querySelector(".hp-slider-fill");
      var handle = popup.querySelector(".hp-slider-handle");
      var sollEl = popup.querySelector(".hp-popup-soll");
      var istEl = popup.querySelector(".hp-popup-ist-val");
      fill.style.height = pct + "%";
      handle.style.bottom = pct + "%";
      handle.style.opacity = pct > 0 ? "1" : "0";
      sollEl.textContent = fmtTemp(sollVal);
      istEl.textContent = " " + fmtTemp(istVal) + " °C";
    }

    function openHeatPopup(ctx) {
      var popup = ensureHeatPopup();
      var slider = popup.querySelector(".hp-slider");
      var closeBtn = popup.querySelector(".hp-popup-close");
      var titleEl = popup.querySelector(".hp-popup-title");

      titleEl.textContent = ctx.name || "Heizung";

      var sollRaw = parseFloat(vis.states[ctx.readSoll + ".val"]);
      var istRaw  = parseFloat(vis.states[ctx.readIst  + ".val"]);
      if (!isFinite(sollRaw)) {
        sollRaw = HEAT_MIN;
      }
      renderHeatPopup(popup, sollRaw, istRaw);

      var dragging = false;
      var lastWritten = -999;

      function tempFromEvent(e) {
        var rect = slider.getBoundingClientRect();
        var clientY;
        if (e.touches && e.touches.length) {
          clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length) {
          clientY = e.changedTouches[0].clientY;
        } else {
          clientY = e.clientY;
        }
        var rel = (rect.bottom - clientY) / rect.height;
        if (rel < 0) {
          rel = 0;
        }
        if (rel > 1) {
          rel = 1;
        }
        var raw = HEAT_MIN + rel * (HEAT_MAX - HEAT_MIN);
        return clampHeat(snapHeat(raw));
      }

      function onPointerDown(e) {
        dragging = true;
        if (e.cancelable) {
          e.preventDefault();
        }
        var t = tempFromEvent(e);
        var ist = parseFloat(vis.states[ctx.readIst + ".val"]);
        renderHeatPopup(popup, t, ist);
      }

      function onPointerMove(e) {
        if (!dragging) {
          return;
        }
        if (e.cancelable) {
          e.preventDefault();
        }
        var t = tempFromEvent(e);
        var ist = parseFloat(vis.states[ctx.readIst + ".val"]);
        renderHeatPopup(popup, t, ist);
      }

      function onPointerUp(e) {
        if (!dragging) {
          return;
        }
        dragging = false;
        var t = tempFromEvent(e);
        var ist = parseFloat(vis.states[ctx.readIst + ".val"]);
        renderHeatPopup(popup, t, ist);
        if (t !== lastWritten && ctx.oidSetAbsCmd) {
          vis.setValue(ctx.oidSetAbsCmd, t);
          lastWritten = t;
        }
      }

      var passiveFalse = {
        passive: false
      };

      slider.addEventListener("mousedown", onPointerDown);
      slider.addEventListener("touchstart", onPointerDown, passiveFalse);
      document.addEventListener("mousemove", onPointerMove);
      document.addEventListener("touchmove", onPointerMove, passiveFalse);
      document.addEventListener("mouseup", onPointerUp);
      document.addEventListener("touchend", onPointerUp);
      document.addEventListener("touchcancel", onPointerUp);

      function close() {
        popup.classList.remove("is-open");
        slider.removeEventListener("mousedown", onPointerDown);
        slider.removeEventListener("touchstart", onPointerDown, passiveFalse);
        document.removeEventListener("mousemove", onPointerMove);
        document.removeEventListener("touchmove", onPointerMove, passiveFalse);
        document.removeEventListener("mouseup", onPointerUp);

        if (e.target === popup) {
          close();
        }
      }

      function onCloseClick(e) {
        e.stopPropagation();
        close();
      }

      popup.addEventListener("click", onBackdropClick);
      closeBtn.addEventListener("click", onCloseClick);

      ctx.popupOnExternalUpdate = function (newSoll, newIst) {
        if (dragging) {
          return;
        }
        renderHeatPopup(popup, newSoll, newIst);
      };

      requestAnimationFrame(function () {
        popup.classList.add("is-open");

    ns.heat = function (el) {
      var $this = $(el);
      var oidSetAbsCmd   = $this.data("oid-set-abs-cmd");
      var oidSetAbsState = $this.data("oid-set-abs-state");
      var oidSetRelCmd   = $this.data("oid-set-rel-cmd");
      var oidActualState = $this.data("oid-actual-state");
      var name           = $this.data("hp-name") || "Heizung";

      if (vis.editMode) {
        return;
      }
      if (!oidSetAbsCmd && !oidSetRelCmd && !oidSetAbsState && !oidActualState) {
        return;
      }

      var readSoll = oidSetAbsState || oidSetAbsCmd;
      var readIst  = oidActualState;

      var ctx = {
        oidSetAbsCmd: oidSetAbsCmd,
        oidSetRelCmd: oidSetRelCmd,
        readSoll: readSoll,
        readIst: readIst,
        name: name,
        popupOnExternalUpdate: null
      };

      var $sollVal = $this.find(".hp-soll-val");
      var $istVal  = $this.find(".hp-ist-val");

      function applyState() {
        var soll = parseFloat(vis.states[readSoll + ".val"]);
        var ist  = parseFloat(vis.states[readIst  + ".val"]);
        $sollVal.text(fmtTemp(soll));
        $istVal.text(" " + fmtTemp(ist) + "°C");
        if (ctx.popupOnExternalUpdate) {
          ctx.popupOnExternalUpdate(soll, ist);
        }
      }

      function onStateChange(e, val) {
        applyState();
      }

      applyState();

      if (readSoll) {
        vis.states.bind(readSoll + ".val", onStateChange);
      }
      if (readIst && readIst !== readSoll) {
        vis.states.bind(readIst + ".val", onStateChange);
      }

      // ===== Press detection (button click vs. long-press popup) =====
      var pressTimer = null;
      var longPressed = false;
      var moved = false;
      var startX = 0;
      var startY = 0;
      var pressedAction = null;
      var LONG_PRESS_MS = 500;
      var MOVE_TOL = 12;

      function getXY(e) {
        var oe = e.originalEvent || e;
        if (oe.touches && oe.touches.length) {
          return [oe.touches[0].clientX, oe.touches[0].clientY];
        }
        if (oe.changedTouches && oe.changedTouches.length) {
          return [oe.changedTouches[0].clientX, oe.changedTouches[0].clientY];
        }
        return [e.clientX || 0, e.clientY || 0];
      }

      function startPress(e) {
        var p = getXY(e);
        longPressed = false;
        moved = false;
        startX = p[0];
        startY = p[1];
        var btn = $(e.target).closest("[data-hp-action]")[0];
        pressedAction = btn ? btn.getAttribute("data-hp-action") : null;
        pressTimer = setTimeout(function () {
          longPressed = true;
          pressTimer = null;
          openHeatPopup(ctx);
        }, LONG_PRESS_MS);
      }

      function cancelPress() {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      }

      function onPressStart(e) {
        if (e.type === "mousedown" && e.button !== undefined && e.button !== 0) {
          return;
        }
        startPress(e);
      }

      function onPressMove(e) {
        if (pressTimer === null && !longPressed) {
          return;
        }
        var p = getXY(e);
        if (Math.abs(p[0] - startX) > MOVE_TOL || Math.abs(p[1] - startY) > MOVE_TOL) {
          moved = true;
          cancelPress();
        }
      }

      function performRel(action) {
        if (!oidSetRelCmd) {
          return;
        }
        if (action === "rel-up") {
          vis.setValue(oidSetRelCmd, true);
        } else if (action === "rel-down") {
          vis.setValue(oidSetRelCmd, false);
        }
      }

      function onRelease(e) {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
        if (longPressed || moved) {
          longPressed = false;
          moved = false;
          pressedAction = null;
          return;
        }
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          pressedAction = null;
          return;
        }
        if (pressedAction) {
          performRel(pressedAction);
          pressedAction = null;
        }
      }

      $this.on("mousedown.newbornHeat touchstart.newbornHeat", onPressStart);
      $this.on("mousemove.newbornHeat touchmove.newbornHeat", onPressMove);
      $this.on("mouseup.newbornHeat mouseleave.newbornHeat touchend.newbornHeat touchcancel.newbornHeat", onRelease);

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornHeat");
        cancelPress();
        if (vis.states.unbind) {
          if (readSoll) {

          }
          if (readIst && readIst !== readSoll) {
            vis.states.unbind(readIst + ".val", onStateChange);
          }
        }

    // ===== Fenster-Öffner (2- and 4-button variants share this) =====
    /**
     * Both Fenster templates render <button data-fn-oid="..."> elements.
     * The data-fn-oid value is the kebab-case of the corresponding
     * data-oid-* attribute on the wrap div (e.g. "oid-fenster-auf").
     * Each button click writes `true` to that OID — no read, no toggle,
     * no status on the action OIDs. If a button's OID is empty, the
     * button is disabled.
     *
     * Top-right .fn-badge mirrors oid_window_state — same logic as the
     * Jalousie widget: state set + true → red "offen"; state set + false
     * → green "zu"; state unset → no badge.
     */
    ns.fenster = function (el) {
      var $this = $(el);
      if (vis.editMode) {
        return;
      }

      $this.find("[data-fn-oid]").each(function () {
        var $btn = $(this);
        var oidKey = $btn.attr("data-fn-oid"); // e.g. "oid-fenster-auf"

          $btn.prop("disabled", true);
          return;
        }

          e.preventDefault();
          e.stopPropagation();
          if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
            return;
          }
          vis.setValue(oid, true);
        });
      });

      // Window-state badge (same convention as the Jalousie widget).
      var oidWindowState = $this.data("oid-window-state");
      var $badge = $this.find(".fn-badge");
      var onWindowStateChange = null;

      function applyBadge() {
        if (!oidWindowState) {
          $badge.removeClass("is-shown is-open is-closed").text("");

        }

          .addClass("is-shown")
          .toggleClass("is-open", open)
          .toggleClass("is-closed", !open)
          .text(open ? "offen" : "zu");

      }

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).find("[data-fn-oid]").off(".newbornFenster");
