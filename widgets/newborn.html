    // ===== Schalter (generic on/off tile) =====
    /**
     * Same KNX auto-detect as the Light/Toggle widgets:
     *   - oid_status set   → 2-DP (write to oid, read from oid_status)
     *   - oid_status empty → 1-DP (oid bidirectional)
     * invert_status only takes effect in 2-DP mode.
     * Tap toggles. The pill mirrors the resulting state — blue with
     * the editable on-label when ON, grey (no text) when OFF.
     *
     * Title autofit: a single-word title shrinks to fit on one line; if
     * even at min size it doesn't fit, fall back to 2-line wrap +
     * hyphenation (CSS default). Multi-word titles always use the 2-line
     * wrap since splitting at word boundaries reads cleaner.
     */
    /**
     * Apply user-supplied font_family (whole tile via cascade) and
     * font_size (title only via CSS var). Both come in as data-*
     * attributes on the wrap div, set via the editor. We set them via
     * jQuery .css() which is XSS-safe — invalid CSS is silently dropped
     * by the DOM, unlike inline-EJS string concatenation which could
     * inject extra declarations.
     */
    function applyTileFont($wrap, $name) {
      var ff = $wrap.data("font-family");
      if (typeof ff === "string" && ff.trim().length > 0) {
        $wrap.css("font-family", ff);
      } else {
        $wrap.css("font-family", "");
      }
      var fs = parseInt($wrap.data("font-size"), 10);
      if (isFinite(fs) && fs >= 1 && fs <= 96) {
        $name.css("--sw-name-base-size", fs + "px");
      } else {
        $name.css("--sw-name-base-size", "");
      }
    }

    function autoFitSwitchName($name) {
      var el = $name && $name[0];
      if (!el) {
        return;
      }
      var text = (el.textContent || "").trim();
      if (!text) {
        return;
      }

      // Reset prior overrides so we always measure from the size-class baseline.
      el.classList.remove("is-single-word");
      el.style.fontSize = "";

      // Multi-word: keep CSS defaults (line-clamp 2 + hyphens).
      if (/\s/.test(text)) {
        return;
      }

      // Single word: try nowrap + shrink-to-fit.
      el.classList.add("is-single-word");

      var available = el.clientWidth;
      if (!available) {
        // Element not laid out yet — leave the is-single-word class on
        // so a layout pass at least gets nowrap; do not shrink.
        return;
      }

      var baseSize = parseFloat(window.getComputedStyle(el).fontSize) || 16;
      var minSize = Math.max(10, Math.floor(baseSize * 0.6));
      var size = baseSize;
      while (el.scrollWidth > available && size > minSize) {
        size -= 1;
        el.style.fontSize = size + "px";
      }

      // Still doesn't fit even at min → drop nowrap, let CSS hyphens
      // wrap onto two lines. Reset font-size back to size-class default.
      if (el.scrollWidth > available) {
        el.classList.remove("is-single-word");
        el.style.fontSize = "";
      }
    }

    ns.schalter = function (el) {
      var $this = $(el);
      var oid       = $this.data("oid");
      var oidStatus = $this.data("oid-status");
      var invert    = ($this.data("invert") === true || $this.data("invert") === "true");

      var $tile = $this.find(".vis-newborn-switch-tile");
      var $pill = $this.find(".sw-pill");
      var $name = $this.find(".sw-name");

      // ---- Cosmetic setup (must run in BOTH edit + runtime mode) ----
      // applyTileFont and autofit don't bind events or subscribe to states,
      // they just adjust inline styles. Doing them up front guarantees the
      // editor preview correctly reflects font_family / font_size /
      // shrink-to-fit instead of falling back to the size-class defaults.
      applyTileFont($this, $name);

      function fitName() { autoFitSwitchName($name); }
      fitName();
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(fitName);
      }
      var fitTimer = setTimeout(fitName, 60);

      // In editor mode (or with no OID configured) we skip the interactive
      // wiring but still register a destroy handler so the autofit timer
      // doesn't leak when the user re-renders the widget.
      if (vis.editMode || !oid) {
        $this.data("destroy", function () {
          if (fitTimer) {
            clearTimeout(fitTimer);
            fitTimer = null;
          }
        });
        return;
      }

      // ---- Runtime: state binding + click toggle ----
      var oidRead = oidStatus || oid;
      var moved = false;

      function applyState(rawVal) {
        var on = isOn(rawVal);
        if (oidStatus && invert) {
          on = !on;
        }
        $tile.toggleClass("is-on", on);
        $pill.toggleClass("is-on", on);
        $tile.attr("aria-checked", on ? "true" : "false");
      }

      function onStateChange(e, newVal) {
        applyState(newVal);
      }

      applyState(vis.states[oidRead + ".val"]);
      vis.states.bind(oidRead + ".val", onStateChange);

      $this.on("click.newbornSwitch touchend.newbornSwitch", function () {
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          return;
        }
        if (moved) {
          return;
        }
        var current = vis.states[oidRead + ".val"];
        var on = isOn(current);
        if (oidStatus && invert) {
          on = !on;
        }
        var next = !on;
        var writeValue = (oidStatus && invert) ? !next : next;
        vis.setValue(oid, writeValue);
      });
      $this.on("touchmove.newbornSwitch", function () {
        moved = true;
      });
      $this.on("touchstart.newbornSwitch", function () {
        moved = false;
      });

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornSwitch");
        if (fitTimer) {
          clearTimeout(fitTimer);
          fitTimer = null;
        }
        if (vis.states.unbind) {
          vis.states.unbind(oidRead + ".val", onStateChange);
        }
      });
    };

    // ===== Taster (momentary push button) =====
    /**
     * Press writes `true`, release writes `false`. No status DP, no
     * toggle. Pill mirrors the press state purely for visual feedback.
     * Listens to both pointer (mouse) and touch events; the explicit
     * pressed-flag avoids double-fires when the OS synthesizes a mouse
     * event after a touch. window-blur safety release covers the case
     * where the user alt-tabs while still holding the button down.
     */
    ns.taster = function (el) {
      var $this = $(el);
      var oid   = $this.data("oid");

      var $tile = $this.find(".vis-newborn-switch-tile");
      var $pill = $this.find(".sw-pill");
      var $name = $this.find(".sw-name");

      // Cosmetic setup runs in BOTH edit + runtime mode (see ns.schalter
      // for rationale — same applies here).
      applyTileFont($this, $name);

      function fitName() { autoFitSwitchName($name); }
      fitName();
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(fitName);
      }
      var fitTimer = setTimeout(fitName, 60);

      if (vis.editMode || !oid) {
        $this.data("destroy", function () {
          if (fitTimer) {
            clearTimeout(fitTimer);
            fitTimer = null;
          }
        });
        return;
      }

      var pressed = false;

      function setPressed(p) {
        if (p === pressed) {
          return;
        }
        pressed = p;
        $pill.toggleClass("is-on", p);
        $tile.toggleClass("is-on", p);
        $tile.attr("aria-pressed", p ? "true" : "false");
        try {
          vis.setValue(oid, p);
        } catch (e) {
          // swallow — never let a single failed write hang the widget
        }
      }

      function onPressStart(e) {
        if (e.type === "mousedown" && e.button !== undefined && e.button !== 0) {
          return;
        }
        if (e.cancelable) {
          e.preventDefault();
        }
        setPressed(true);
      }

      function onPressEnd() {
        if (!pressed) {
          return;
        }
        setPressed(false);
      }

      $this.on("mousedown.newbornTaster touchstart.newbornTaster", onPressStart);
      $this.on(
        "mouseup.newbornTaster mouseleave.newbornTaster " +
        "touchend.newbornTaster touchcancel.newbornTaster",
        onPressEnd
      );

      // Safety: if the user alt-tabs / switches app while holding the
      // button, release programmatically so we don't strand the DP at true.
      var blurNs = ".newbornTaster_" + (oid || "_").replace(/[^a-zA-Z0-9_]/g, "_");
      $(window).on("blur" + blurNs, onPressEnd);


      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornTaster");
        $(window).off("blur" + blurNs);
        if (fitTimer) {
          clearTimeout(fitTimer);
          fitTimer = null;
        }
        // If destroyed while still pressed (e.g. view switch mid-press),
        // release the DP so it doesn't stay stuck at true.
        if (pressed) {
          try { vis.setValue(oid, false); } catch (e) { /* ignore */ }
        }
      });
    };

    // ===== Time-setter (popup with native <input type="time">) =====
    var sharedTimePopup = null;

    function ensureTimePopup() {
      if (sharedTimePopup) {
        return sharedTimePopup;
      }
      var popup = document.createElement("div");
      popup.className = "vis-newborn-time-popup";
      popup.innerHTML = [
        '<div class="tm-popup-card">',
        '  <button type="button" class="tm-popup-close" aria-label="Schliessen">&times;</button>',
        '  <div class="tm-popup-title">Time</div>',
        '  <div class="tm-popup-input-wrap">',
        '    <input type="time" class="tm-popup-input" step="60">',
        '  </div>',
        '  <div class="tm-popup-actions">',
        '    <button type="button" class="tm-popup-btn tm-popup-cancel">Abbrechen</button>',
        '    <button type="button" class="tm-popup-btn is-primary tm-popup-ok">OK</button>',
        '  </div>',
        '</div>'
      ].join("");
      document.body.appendChild(popup);
      sharedTimePopup = popup;
      return popup;
    }

    /**
     * Normalize whatever the OID currently holds into "HH:MM" 24h
     * format suitable for <input type="time">. Accepts strings like
     * "11:20", "11:20:00", "1:5", numbers like 1120 (HHMM) or seconds
     * since midnight, and falls back to "12:00" if nothing parseable.
     */
    function normalizeHHMM(raw) {
      if (raw === null || raw === undefined || raw === "") {
        return "12:00";
      }
      var s = String(raw).trim();
      var m = s.match(/^(\d{1,2})\s*[:\.h]\s*(\d{1,2})/);
      if (m) {
        var h = parseInt(m[1], 10);
        var mn = parseInt(m[2], 10);
        if (h >= 0 && h < 24 && mn >= 0 && mn < 60) {
          return (h < 10 ? "0" + h : "" + h) + ":" + (mn < 10 ? "0" + mn : "" + mn);
        }
      }
      var n = parseInt(s, 10);
      if (isFinite(n)) {
        // HHMM as integer (e.g. 1120 → 11:20)
        if (n >= 0 && n <= 2359) {
          var hh = Math.floor(n / 100);
          var mm = n % 100;
          if (hh < 24 && mm < 60) {
            return (hh < 10 ? "0" + hh : "" + hh) + ":" + (mm < 10 ? "0" + mm : "" + mm);
          }
        }
      }
      return "12:00";
    }

    function openTimePopup(ctx) {
      var popup = ensureTimePopup();
      var input    = popup.querySelector(".tm-popup-input");
      var okBtn    = popup.querySelector(".tm-popup-ok");
      var cancelBtn= popup.querySelector(".tm-popup-cancel");
      var closeBtn = popup.querySelector(".tm-popup-close");

      input.value = normalizeHHMM(vis.states[ctx.oid + ".val"]);

      function close() {
        popup.classList.remove("is-open");
        okBtn.removeEventListener("click", onOk);
        cancelBtn.removeEventListener("click", onCancel);
        closeBtn.removeEventListener("click", onCancel);
        popup.removeEventListener("click", onBackdrop);
        input.removeEventListener("keydown", onKey);
      }
      function onOk(e) {
        e.stopPropagation();
        var v = input.value;
        if (/^\d{1,2}:\d{2}$/.test(v)) {
          // Pad to HH:MM
          var parts = v.split(":");
          var hh = parseInt(parts[0], 10);
          var mm = parseInt(parts[1], 10);
          var out = (hh < 10 ? "0" + hh : "" + hh) + ":" + (mm < 10 ? "0" + mm : "" + mm);
          vis.setValue(ctx.oid, out);
        }
        close();
      }
      function onCancel(e) {
        e.stopPropagation();
        close();
      }
      function onBackdrop(e) {
        if (e.target === popup) {
          close();
        }
      }
      function onKey(e) {
        if (e.key === "Enter") { onOk(e); }
        else if (e.key === "Escape") { onCancel(e); }
      }

      okBtn.addEventListener("click", onOk);
      cancelBtn.addEventListener("click", onCancel);
      closeBtn.addEventListener("click", onCancel);
      popup.addEventListener("click", onBackdrop);
      input.addEventListener("keydown", onKey);

      requestAnimationFrame(function () {
        popup.classList.add("is-open");
        // Best effort: focus the input after the open transition starts.
        try { input.focus(); } catch (e) { /* ignore */ }
      });
    }

    /**
     * Tile click → popup. Reads OID for the current value display.
     * No status bind side-effects beyond updating .tm-value text.
     */
    ns.timeSetter = function (el) {
      var $this = $(el);
      var oid   = $this.data("oid");
      var $value = $this.find(".tm-value");

      function applyState() {
        var raw = oid ? vis.states[oid + ".val"] : null;
        if (raw === null || raw === undefined || raw === "") {
          $value.addClass("is-empty").text("--:--");
        } else {
          $value.removeClass("is-empty").text(String(raw));
        }
      }
      function onStateChange() { applyState(); }

      applyState();

      if (vis.editMode || !oid) {
        return;
      }

      vis.states.bind(oid + ".val", onStateChange);

      $this.on("click.newbornTime touchend.newbornTime", function (e) {
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          return;
        }
        // Avoid double-fire from click after touchend (mobile)
        if (e.type === "touchend") {
          e.preventDefault();
        }
        openTimePopup({ oid: oid });
      });

      $this.data("destroy", function (id, $widget) {
        ($widget || $this).off(".newbornTime");
        if (vis.states.unbind) {
          vis.states.unbind(oid + ".val", onStateChange);
        }
      });
    };

    // ===== Camera Tile =====
    /**
     * Camera image (MJPEG stream or JPEG snapshot) + maximize lightbox.
     * Slot logic (toggle/action buttons) is added in a separate function
     * below; ns.camera composes both.
     *
     * Camera-URL handling:
     *   - empty       → placeholder shown, no img, no listeners
     *   - refresh = 0 → set img.src once. Suits MJPEG multipart streams
     *                   that the browser keeps connected.
     *   - refresh > 0 → setInterval re-sets img.src with a cache-bust
     *                   timestamp param. Suits static JPEG snapshots.
     *
     * Style note: any single-line brace block (CSS keyframe stop, JS
     * function body) inside this widget is parsed by the VIS state
     * substitution as a state-id pattern and breaks the widget. Always
     * write such blocks across multiple lines. Details and examples
     * are in docs/rules/frontend.md.
     */

    // No-op cleanup for slots that have no oid set. Defined as a named
    // multi-line function so the VIS state substitution does not match
    // a single-line empty function body.
    function camNoop() {
      return;
    }

    // Lightbox: only one open at a time, shared across all camera tiles.
    var camLightbox = null;

    function camOpenLightbox(url, title) {
      if (!url || camLightbox) {
        return;
      }
      var box = document.createElement("div");
      box.className = "vis-newborn-camera-lightbox";
      box.innerHTML = [
        '<div class="vis-newborn-camera-lightbox__title"></div>',
        '<div class="vis-newborn-camera-lightbox__inner">',
        '  <img class="vis-newborn-camera-lightbox__img" alt="" />',
        '</div>',
        '<button class="vis-newborn-camera-lightbox__close" type="button" aria-label="Schliessen">&times;</button>'
      ].join("");
      var titleEl = box.querySelector(".vis-newborn-camera-lightbox__title");
      var imgEl   = box.querySelector(".vis-newborn-camera-lightbox__img");
      var closeBtn = box.querySelector(".vis-newborn-camera-lightbox__close");

      titleEl.textContent = title || "";
      imgEl.src = url;

      function close() {
        document.removeEventListener("keydown", onKey);
        if (box.parentNode) {
          box.parentNode.removeChild(box);
        }
        camLightbox = null;
      }
      function onKey(e) {
        if (e.key === "Escape") {
          close();
        }
      }
      function onBackdrop(e) {
        if (e.target === box) {
          close();
        }
      }
      closeBtn.addEventListener("click", close);
      box.addEventListener("click", onBackdrop);
      document.addEventListener("keydown", onKey);

      document.body.appendChild(box);
      camLightbox = box;
    }

    function camApplyCamera(el, $this) {
      var url = $this.data("camera-url") || "";
      var refresh = parseInt($this.data("refresh-seconds"), 10);
      if (!isFinite(refresh) || refresh < 0) {
        refresh = 0;
      }
      var img = el.querySelector(".vis-newborn-camera__img");
      var placeholder = el.querySelector(".vis-newborn-camera__placeholder");

      // Clear any leftover interval from a prior render.
      if (el._newbornCameraInterval) {
        clearInterval(el._newbornCameraInterval);
        el._newbornCameraInterval = null;
      }

      if (!url) {
        img.classList.add("is-hidden");
        img.removeAttribute("src");
        placeholder.classList.add("is-shown");
        return;
      }

      placeholder.classList.remove("is-shown");
      img.classList.remove("is-hidden");
      img.src = url;

      if (refresh > 0) {
        el._newbornCameraInterval = setInterval(function () {
          var sep = url.indexOf("?") >= 0 ? "&" : "?";
          img.src = url + sep + "_t=" + Date.now();
        }, refresh * 1000);
      }
    }

    /**
     * Slot icon rendering. Auto-detects whether the value is a URL
     * (http://, https://, /, ./) and renders <img>; otherwise renders
     * the literal text/emoji as a <span>. Empty falls back to label
     * first character so the button is never visually blank.
     */
    function camSetSlotIcon(slot, icon, label) {
      slot.innerHTML = "";
      var v = (icon || "").trim();
      if (v && (v.indexOf("http://") === 0 || v.indexOf("https://") === 0 || v.charAt(0) === "/" || v.indexOf("./") === 0)) {
        var img = document.createElement("img");
        img.src = v;
        img.alt = "";
        slot.appendChild(img);
        return;
      }
      var span = document.createElement("span");
      span.textContent = v || ((label || "").charAt(0) || "?");
      slot.appendChild(span);
    }

    /**
     * Wire one slot button. Returns a cleanup function the destroy
     * hook calls. Empty oid → slot stays hidden, cleanup is a no-op.
     */
    function camSetupSlot(el, slotEl) {
      var $slot = $(slotEl);
      var oid = $slot.data("slot-oid");
      if (!oid) {
        return camNoop;
      }
      var stateOid = $slot.data("slot-state-oid") || oid;
      var type = $slot.data("slot-type") || "toggle";
      var pulseMs = parseInt($slot.data("slot-pulse-ms"), 10);
      if (!isFinite(pulseMs) || pulseMs < 0) {
        pulseMs = 500;
      }
      var label = $slot.data("slot-label") || "";
      var icon = $slot.data("slot-icon") || "";
      var activeColor = $slot.data("slot-active-color") || "#ffc857";
      var invert = ($slot.data("slot-invert-state") === true || $slot.data("slot-invert-state") === "true");

      slotEl.classList.remove("vis-newborn-camera__slot--hidden");
      slotEl.style.setProperty("--slot-color", activeColor);
      slotEl.setAttribute("aria-label", label || oid);
      if (label) {
        slotEl.setAttribute("title", label);
      }
      camSetSlotIcon(slotEl, icon, label);

      var onStateChange = null;

      if (type === "toggle") {
        var applyState = function (rawVal) {
          var on = isOn(rawVal);
          if (invert) {
            on = !on;
          }
          slotEl.classList.toggle("is-active", on);
          slotEl.setAttribute("aria-pressed", on ? "true" : "false");
        };
        applyState(vis.states[stateOid + ".val"]);
        if (!vis.editMode) {
          onStateChange = function (e, newVal) {
            applyState(newVal);
          };
          vis.states.bind(stateOid + ".val", onStateChange);
        }
      } else {
        slotEl.setAttribute("role", "button");
      }

      $slot.on("click.newbornCamera touchend.newbornCamera", function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (vis.editMode) {
          return;
        }
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          return;
        }
        if (type === "toggle") {
          var cur = isOn(vis.states[stateOid + ".val"]);
          vis.setValue(oid, !cur);
        } else {
          slotEl.classList.add("is-pulsing");
          vis.setValue(oid, true);
          setTimeout(function () {
            vis.setValue(oid, false);
            slotEl.classList.remove("is-pulsing");
          }, pulseMs);
        }
      });

      return function cleanup() {
        $slot.off(".newbornCamera");
        if (onStateChange && vis.states.unbind) {
          vis.states.unbind(stateOid + ".val", onStateChange);
        }
      };
    }

    ns.camera = function (el) {
      var $this = $(el);
      camApplyCamera(el, $this);

      var slotCleanups = [];
      var slotEls = el.querySelectorAll(".vis-newborn-camera__slot");
      for (var i = 0; i < slotEls.length; i++) {
        slotCleanups.push(camSetupSlot(el, slotEls[i]));
      }

      var $max = $this.find(".vis-newborn-camera__max");
      $max.on("click.newbornCamera touchend.newbornCamera", function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (typeof vis.detectBounce === "function" && vis.detectBounce(this)) {
          return;
        }
        camOpenLightbox($this.data("camera-url") || "", $this.data("name") || "");
      });

      $this.data("destroy", function (id, $widget) {
        var $w = $widget || $this;
        $w.find(".vis-newborn-camera__max").off(".newbornCamera");
        for (var j = 0; j < slotCleanups.length; j++) {
          try {
            slotCleanups[j]();
          } catch (err) {
            // swallow — cleanup must not throw
          }
        }
        if (el._newbornCameraInterval) {
          clearInterval(el._newbornCameraInterval);
          el._newbornCameraInterval = null;
        }
      });
    };

    if (!ns._versionLogged) {
      console.log("vis-newborn 0.2.6 ready");
      ns._versionLogged = true;
    }
  })();
</script>
